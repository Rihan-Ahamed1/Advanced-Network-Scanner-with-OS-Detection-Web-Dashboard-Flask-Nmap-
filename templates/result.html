<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentinel | Security Dashboard</title>

<style>
:root {
    --primary: #38bdf8;
    --bg: #020617;
    --card: #0f172a;
    --accent: #22c55e;
}

body {
    background: var(--bg);
    color: #f8fafc;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.dashboard-frame {
    background: var(--card);
    width: 450px;
    padding: 40px;
    border-radius: 24px;
    border: 1px solid rgba(56, 189, 248, 0.2);
    text-align: center;
    position: relative;
}

/* RADAR */
.radar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid rgba(34, 197, 94, 0.2);
    margin: 0 auto 30px;
    position: relative;
    background: repeating-radial-gradient(
        transparent,
        transparent 20px,
        rgba(34, 197, 94, 0.05) 21px
    );
}

.radar::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: conic-gradient(from 0deg, transparent 70%, var(--accent));
    border-radius: 50%;
    animation: rotate 2s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* TEXT */
h1 {
    color: var(--primary);
    letter-spacing: 2px;
    text-transform: uppercase;
}

p {
    color: #64748b;
}

/* BUTTON */
.btn-init {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 30px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn-init:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px var(--accent);
}

/* LOADING */
#loading-overlay {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--card);
    border-radius: 24px;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

</style>
</head>

<body>

<div class="dashboard-frame">

    <!-- MAIN -->
    <div id="main-content">
        <div class="radar"></div>
        <h1>Sentinel v4.0</h1>
        <p>Advanced Network Reconnaissance</p>

        <form id="scanForm" action="/scan" method="GET">
            <button type="button" onclick="startScan()" class="btn-init">
                Execute Audit
            </button>
        </form>
    </div>

    <!-- LOADING -->
    <div id="loading-overlay">
        <div class="radar"></div>
        <h2 style="color: var(--primary)">Scanning Infrastructure...</h2>
        <p>Analyzing Devices • Detecting Ports</p>
    </div>

</div>

<script>
function startScan() {
    document.getElementById('main-content').style.opacity = '0.2';
    document.getElementById('loading-overlay').style.display = 'flex';

    setTimeout(() => {
        document.getElementById("scanForm").submit();
    }, 2000);
}
</script>

</body>
</html>
