<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel | Security Dashboard</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #020617;
            --card: #0f172a;
            --accent: #22c55e;
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-frame {
            background: var(--card);
            width: 500px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        .radar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid rgba(34, 197, 94, 0.2);
            margin: 0 auto 30px;
            position: relative;
            background: repeating-radial-gradient(transparent, transparent 20px, rgba(34, 197, 94, 0.05) 21px);
        }

        .radar::after {
            content: "";
            position: absolute;
            top: -2px; left: -2px; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, transparent 70%, var(--accent));
            border-radius: 50%;
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 { font-size: 24px; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }

        .btn-init {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-init:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }

        #loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card);
            border-radius: 24px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .progress-container {
            width: 80%;
            height: 4px;
            background: #1e293b;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            animation: load 5s forwards ease-in-out;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="dashboard-frame">
        <div id="main-content">
            <div class="radar"></div>
            <h1>Sentinel v4.0</h1>
            <p>Advanced Network Reconnaissance Protocol</p>
            <a href="javascript:void(0)" onclick="startScan()" class="btn-init">Execute Audit</a>
        </div>

        <div id="loading-overlay">
            <div class="radar"></div>
            <h2 style="color: var(--primary)">Scanning Infrastructure...</h2>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <p style="margin-top: 15px;">Injecting Nmap packets • Analyzing subnet</p>
        </div>
    </div>

    <script>
        function startScan() {
            document.getElementById('main-content').style.opacity = '0.2';
            document.getElementById('loading-overlay').style.display = 'flex';
            setTimeout(() => {
                window.location.href = "/scan";
            }, 3000); 
        }
    </script>
</body>
</html>
